apiVersion: tinx.io/v1
kind: Provider
metadata:
  namespace: sourceplane
  name: tinx-setup-kubectl
  version: v0.1.0
  description: Lazily installs kubectl into the active Tinx workspace using a bundled Go runtime.
spec:
  bundles:
    - name: setup-kubectl
      layers:
        - platform:
            os: darwin
            arch: amd64
          mediaType: application/vnd.tinx.tool.binary
          source: dist/bin/darwin/amd64/tinx-provider-kubectl
        - platform:
            os: darwin
            arch: arm64
          mediaType: application/vnd.tinx.tool.binary
          source: dist/bin/darwin/arm64/tinx-provider-kubectl
        - platform:
            os: linux
            arch: amd64
          mediaType: application/vnd.tinx.tool.binary
          source: dist/bin/linux/amd64/tinx-provider-kubectl
        - platform:
            os: linux
            arch: arm64
          mediaType: application/vnd.tinx.tool.binary
          source: dist/bin/linux/arm64/tinx-provider-kubectl
        - platform:
            os: linux
            arch: arm
          mediaType: application/vnd.tinx.tool.binary
          source: dist/bin/linux/arm/tinx-provider-kubectl
        - platform:
            os: windows
            arch: amd64
          mediaType: application/vnd.tinx.tool.binary
          source: dist/bin/windows/amd64/tinx-provider-kubectl.exe
        - platform:
            os: windows
            arch: arm64
          mediaType: application/vnd.tinx.tool.binary
          source: dist/bin/windows/arm64/tinx-provider-kubectl.exe
  environments:
    - name: kubectl-env
      variables:
        KUBECTL_PROVIDER_REF: ${provider_ref}
      export:
        - KUBECTL_PROVIDER_REF
  tools:
    - name: setup-kubectl
      runtime: oci
      from: bundle.setup-kubectl
      provides:
        - setup-kubectl
    - name: kubectl
      default: true
      runtime: local
      install:
        tool: setup-kubectl
        path: bin/kubectl
      dependsOn:
        - tool: setup-kubectl
      provides:
        - kubectl
      environments:
        - kubectl-env
