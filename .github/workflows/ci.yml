name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: providers/setup-kubectl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: providers/setup-kubectl/go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Validate release build
        uses: sourceplane/tinx-action@v2
        with:
          working-directory: providers/setup-kubectl
          run: |
            tinx release \
              --manifest provider.yaml \
              --main ./cmd/tinx-provider-kubectl \
              --dist dist \
              --output oci \
              --tag ci

      - name: Smoke test transient providers
        uses: sourceplane/tinx-action@v2
        env:
          KUBECTL_VERSION: v1.30.6
        with:
          working-directory: providers/setup-kubectl
          providers: |
            ${{ github.workspace }}/providers/setup-kubectl/oci as kubectl
          run: |
            kubectl version --client -o json

      - name: Smoke test workspace manifest
        uses: sourceplane/tinx-action@v2
        env:
          KUBECTL_VERSION: v1.30.6
        with:
          working-directory: providers/setup-kubectl
          workspace: examples/workspace.local.tinx.yaml
          run: |
            kubectl version --client -o json
