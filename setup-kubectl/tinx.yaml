apiVersion: tinx.io/v1
kind: Provider
metadata:
  namespace: acme
  name: setup-kubectl
  version: v0.1.0
  description: Azure-inspired setup provider that lazily downloads kubectl through a setup tool
spec:
  bundles:
    - name: setup-kubectl
      layers:
        - platform:
            os: darwin
            arch: amd64
          mediaType: application/vnd.tinx.tool.binary
          source: bin/darwin/amd64/setup-kubectl
        - platform:
            os: darwin
            arch: arm64
          mediaType: application/vnd.tinx.tool.binary
          source: bin/darwin/arm64/setup-kubectl
        - platform:
            os: linux
            arch: amd64
          mediaType: application/vnd.tinx.tool.binary
          source: bin/linux/amd64/setup-kubectl
        - platform:
            os: linux
            arch: arm64
          mediaType: application/vnd.tinx.tool.binary
          source: bin/linux/arm64/setup-kubectl
  environments:
    - name: kubectl-env
      variables:
        KUBECTL_PROVIDER_REF: ${provider_ref}
      export:
        - KUBECTL_PROVIDER_REF
  tools:
    - name: setup-kubectl
      runtime:
        type: oci
      source:
        type: bundle
        ref: setup-kubectl
      install:
        strategy: lazy
      provides:
        - setup-kubectl
    - name: kubectl
      default: true
      runtime:
        type: local
      install:
        strategy: lazy
        tool: setup-kubectl
        path: bin/kubectl
      provides:
        - kubectl
      dependsOn:
        - tool: setup-kubectl
      environments:
        - kubectl-env